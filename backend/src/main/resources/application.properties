spring.application.name=visit-sri-lanka-api
server.port=8080

# CORS: allow the local Next.js dev server to call this API during development
# (Configure a proper CorsConfigurationSource bean in config/ before production)
spring.mvc.cors.allowed-origins=http://localhost:3000

# --- Database (MongoDB — same cluster/database the frontend uses via
# MONGODB_URI, or a separate one if you want the Spring Boot API and
# Next.js talking to different databases). Leave blank for now — the app
# still boots for the /api/health check with no Mongo connection configured.
spring.data.mongodb.uri=mongodb://localhost:27017/visit_sri_lanka

# --- JWT (not wired up yet — see docs/architecture.md) ---
# jwt.secret=
# jwt.access-token-expiration-ms=900000
# jwt.refresh-token-expiration-ms=604800000
