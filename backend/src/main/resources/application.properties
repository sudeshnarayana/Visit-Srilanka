spring.application.name=visit-sri-lanka-api
server.port=8080

# CORS: allow the local Next.js dev server to call this API during development
# (Configure a proper CorsConfigurationSource bean in config/ before production)
spring.mvc.cors.allowed-origins=http://localhost:3000

# --- Database (Supabase-hosted PostgreSQL) ---
# Fill these in once Supabase is provisioned (Architecture doc Phase 9).
# Leave blank for now — the app will still boot for the /api/health check
# as long as spring-boot-starter-data-jpa has no entities/repositories in use yet.
spring.datasource.url=jdbc:postgresql://localhost:5432/visit_sri_lanka
spring.datasource.username=
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# --- JWT (Phase 3 — not wired up yet) ---
